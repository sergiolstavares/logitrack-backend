spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/logitrack}
    username: ${DB_USER:logitrack}
    password: ${DB_PASSWORD:logitrack123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:logitrack-super-secret-key-minimum-32-chars-ok}
    expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.logitrack: INFO
    org.springframework.security: WARN
